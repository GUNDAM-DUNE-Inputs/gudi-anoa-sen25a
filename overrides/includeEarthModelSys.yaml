## Include Earth model parameters:  Use with
#
# --override-files ${CONFIG_DIR}/overrides/includeEarthModelSys.yaml
#

fitterEngineConfig:
  likelihoodInterfaceConfig:
    propagatorConfig:
      parametersManagerConfig:
        parameterSetList:
          - name: "Oscillation Parameters"
            parameterDefinitionFilePath: "./inputs/parameters/oscProb/Merged_OA_EarthCov.root"
            covarianceMatrix: MergedCovMatrix
            parameterNameList: MergedParamNames
            parameterPriorValueList: MergedParCentral

            parameterDefinitions:

              - name: "PMNS_SIN_SQUARED_12"
                isEnabled: true
                priorValue: 0.303         # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_SIN_SQUARED_13"
                isEnabled: true
                priorValue: 0.02225       # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_SIN_SQUARED_23"
                isEnabled: true
                priorValue: 0.451         # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_DELTA_MASS_SQUARED_21"
                isEnabled: true
                priorValue: 7.41E-5       # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_DELTA_MASS_SQUARED_32"
                isEnabled: true
                priorValue: 2.51E-3       # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_DELTA_CP"
                isEnabled: true
                priorValue: -2.233        # DUNE prior from Nu-Fit 5.2 w/ SK atm

              - name: "PMNS_SIGN_MASS_SQUARED_32"
                isEnabled: true
                isFixed: true
                priorValue: 0.5           # DUNE prior from Nu-Fit 5.2 w/ SK atm

              ###########################################################
              # Earth model systematics (example 4-layer model)
              ###########################################################

              - name: "EARTH_LAYER_R_1"
                isEnabled: true
                priorValue: 1220.0          # km, example value (tune to your model)
                priorType: Gaussian
                parameterStepSize: 50.0
                #parameterLimits: [ 3000.0, 4000.0 ]

              - name: "EARTH_LAYER_R_2"
                isEnabled: true
                priorValue: 3480.0          # example
                priorType: Gaussian
                parameterStepSize: 50.0
                #parameterLimits: [ 3000.0, 4000.0 ]

              - name: "EARTH_LAYER_R_3"
                isEnabled: true
                priorValue: 5701.0          # example
                priorType: Gaussian
                parameterStepSize: 20.0
                #parameterLimits: [ 5400.0, 6000.0 ]

              - name: "EARTH_LAYER_R_4"
                isEnabled: true
                priorValue: 6371.0          # surface radius, maybe fixed or narrow
                priorType: Gaussian
                parameterStepSize: 10.0
                #parameterLimits: [ 6300.0, 6450.0 ]

              - name: "EARTH_LAYER_W_1"
                isEnabled: true
                priorValue: 1.0             # weight / density scaling; tune as needed
                priorType: Gaussian
                parameterStepSize: 0.05
                #parameterLimits: [ 0.5, 1.5 ]

              - name: "EARTH_LAYER_W_2"
                isEnabled: true
                priorValue: 1.0
                priorType: Gaussian
                parameterStepSize: 0.05
                #parameterLimits: [ 0.5, 1.5 ]

              - name: "EARTH_LAYER_W_3"
                isEnabled: true
                priorValue: 1.0
                priorType: Gaussian
                parameterStepSize: 0.05
                #parameterLimits: [ 0.5, 1.5 ]

              - name: "EARTH_LAYER_W_4"
                isEnabled: true
                priorValue: 1.0
                priorType: Gaussian
                parameterStepSize: 0.05
                #parameterLimits: [ 0.5, 1.5 ]


            dialSetDefinitions:

            #######################################################################3
            #
            # MUON TO ELECTRON, MUON, TAU
            #
            #######################################################################

              - name: OscWeightMuonElectron
                dialType: Kriged
                applyOnDataSets: [ "FD" ]
                applyCondition: "[mcIsCC] == 1 && [iniNuFlavor]==14 && [interNuFlavor]==12 && [detNuFlavor] > 0"
                dialInputList:
                  - name: "EARTH_LAYER_R_1"
                  - name: "EARTH_LAYER_R_2"
                  - name: "EARTH_LAYER_R_3"
                  - name: "EARTH_LAYER_R_4"
                  - name: "EARTH_LAYER_W_1"
                  - name: "EARTH_LAYER_W_2"
                  - name: "EARTH_LAYER_W_3"
                  - name: "EARTH_LAYER_W_4"
                tableConfig:
                  name: "Kriged numu to nue with CUDAProb3"  # Must be unique.
                  libraryPath: "${NUOSCILLATOR_ROOT}/lib/libTabulatedNuOscillator.so"
                  initFunction: "initializeTable"
                  initArguments:
                    - "FLUX_FLAVOR muon"        # muon neutrino flux
                    - "INTERACTION_FLAVOR electron"   # electron neutrino
                    - "PARAMETERS SS12,SS13,SS23,DM21,DM32,DCP,SIGN32,R1,R2,R3,R4,W1,W2,W3,W4"
                    - "ENERGY_RESOLUTION 0.04"
                    - "ZENITH_RESOLUTION 0.0"
                    - "PRODUCTION_HEIGHT 20"
                    - "CONFIG ./inputs/parameters/oscProb/GUNDAM_CUDAProb3_height_EarthSys.config"
                    - "BINNING_FILE ./inputs/parameters/oscProb/ProdHeightDist_E300_cZ300_N1_hbin2.5.root"
                    - "BINNING_HIST ProductionHeight_numu"
                  updateFunction: "updateTable"
                  weightFunction: "weightTable"
                  weightVariables:
                    - "mcEnu"          # Nu energy in GeV
                    - "mcthetaZ"       # Zenith Cosine

              - name: OscWeightMuonMuon
                dialType: Kriged
                applyOnDataSets: [ "FD" ]
                applyCondition: "[mcIsCC] == 1 && [iniNuFlavor]==14 && [interNuFlavor]==14 && [detNuFlavor] > 0"
                dialInputList:
                  - name: "EARTH_LAYER_R_1"
                  - name: "EARTH_LAYER_R_2"
                  - name: "EARTH_LAYER_R_3"
                  - name: "EARTH_LAYER_R_4"
                  - name: "EARTH_LAYER_W_1"
                  - name: "EARTH_LAYER_W_2"
                  - name: "EARTH_LAYER_W_3"
                  - name: "EARTH_LAYER_W_4"
                tableConfig:
                  name: "Kriged numu to numu with CUDAProb3"  # Must be unique.
                  libraryPath: "${NUOSCILLATOR_ROOT}/lib/libTabulatedNuOscillator.so"
                  initFunction: "initializeTable"
